
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Forex Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#082A73">
<style>
body { font-family: Arial; background:#0d1117; color:white; padding:20px; }
.container { max-width:650px; margin:auto; background:#161b22; padding:20px; border-radius:12px; }
h1 { text-align:center; margin-bottom:20px; }
input, select { width:100%; padding:10px; margin-top:8px; background:#22272e; color:white; border:1px solid #30363d; border-radius:8px; }
button { width:100%; padding:12px; background:#238636; border:none; color:white; margin-top:15px; border-radius:8px; cursor:pointer; }
.result { background:#1f6feb; padding:15px; margin-top:15px; border-radius:10px; }
</style>
</head>
<body>

<div class="container">
<h1>Forex Calculator</h1>

<label>Parite</label>
<select id="symbol">
<option>XAUUSD</option><option>XAGUSD</option><option>UKOIL</option><option>USOIL</option>
<option>NATGAS</option><option>NQ100</option><option>DAX30</option><option>US500</option>
<option>DOW30</option><option>EURUSD</option><option>USDJPY</option><option>USDMXN</option>
</select>

<label>Giriş Fiyatı</label>
<input id="entry" type="number" step="0.0001">

<label>Stop Fiyatı</label>
<input id="stop" type="number" step="0.0001">

<label>Hedef Fiyatı</label>
<input id="target" type="number" step="0.0001">

<label>Lot</label>
<input id="lot" type="number" step="0.01" value="0.10">

<button onclick="calc()">Hesapla</button>

<div id="result" class="result" style="display:none;"></div>
</div>

<script>
const contract = {
  XAUUSD:100, XAGUSD:5000, UKOIL:1000, USOIL:1000, NATGAS:30000,
  NQ100:20, DAX30:25, US500:50, DOW30:5,
  EURUSD:100000, USDJPY:100000, USDMXN:100000
};

function calc(){
  let s = document.getElementById('symbol').value;
  let e = parseFloat(document.getElementById('entry').value);
  let st = parseFloat(document.getElementById('stop').value);
  let t = parseFloat(document.getElementById('target').value);
  let lot = parseFloat(document.getElementById('lot').value);

  let ds = Math.abs(e - st);
  let dt = Math.abs(t - e);

  let sl = ds * contract[s] * lot;
  let pr = dt * contract[s] * lot;
  let rr = pr / sl;

  document.getElementById('result').style.display="block";
  document.getElementById('result').innerHTML =
    "<b>Parite:</b> "+s+
    "<br><b>Sözleşme:</b> "+contract[s]+
    "<br><b>Stop Mesafesi:</b> "+ds+
    "<br><b>Hedef Mesafesi:</b> "+dt+
    "<br><b>Stop Zararı:</b> "+sl.toFixed(2)+" USD"+
    "<br><b>Hedef Karı:</b> "+pr.toFixed(2)+" USD"+
    "<br><b>R:R:</b> "+rr.toFixed(2);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
